<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="roofGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB7185" />
      <stop offset="100%" stop-color="#E11D48" />
    </linearGradient>
  </defs>

  <!-- Plot Shadow -->
  <path d="M12 21 L2.5 16 L12 11 L21.5 16 Z" fill="#000000" fill-opacity="0.1"/>

  <!-- Left Face (Soil) -->
  <path d="M2 13 L12 18 V20 L2 15 Z" fill="#92400E" />
  
  <!-- Right Face (Soil) -->
  <path d="M12 18 L22 13 V15 L12 20 Z" fill="#78350F" />

  <!-- Top Surface (Grass) with black boundary -->
  <path d="M12 8 L2 13 L12 18 L22 13 Z" fill="#16A34A" stroke="#1E293B" stroke-width="0.15" stroke-linejoin="round"/>
  
  <!-- 4 Portions grid lines in shade of black -->
  <path d="M7 10.5 L17 15.5 M17 10.5 L7 15.5" stroke="#1E293B" stroke-width="0.15" stroke-linecap="round"/>

  <!-- Flag Shadow in Portion 1 -->
  <ellipse cx="12" cy="10.5" rx="1.5" ry="0.6" fill="#022C22" fill-opacity="0.5" />

  <!-- Flagpole -->
  <path d="M12 10.5 V4" stroke="#1E293B" stroke-width="0.75" stroke-linecap="round"/>
  
  <!-- Waving Flag in Portion 1 -->
  <path d="M12 4 L17 5.5 L12 7 Z" fill="url(#roofGradient)" stroke="#BE123C" stroke-width="0.5" stroke-linejoin="round"/>
</svg>
