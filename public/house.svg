<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="roofGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB7185" />
      <stop offset="100%" stop-color="#E11D48" />
    </linearGradient>
    <linearGradient id="soilGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#92400E" />
      <stop offset="100%" stop-color="#78350F" />
    </linearGradient>
    <linearGradient id="flatGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64748B" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
  </defs>

  <!-- Main Drop Shadow -->
  <ellipse cx="256" cy="386" rx="160" ry="10" fill="#000000" fill-opacity="0.08"/>

  <!-- Chimney Body -->
  <path d="M320 150 V80 H360 V150 Z" fill="url(#flatGradient)" />
  <!-- Chimney Cap -->
  <rect x="312" y="70" width="56" height="12" rx="4" fill="#334155" />

  <!-- House Body -->
  <rect x="140" y="140" width="232" height="230" fill="#FFFFFF" stroke="#94A3B8" stroke-width="8" />
  
  <!-- Roof shadow on wall -->
  <path d="M144 144 L256 120 L368 144 V190 L256 100 L144 190 Z" fill="#E2E8F0" fill-opacity="0.5" />
  
  <!-- White Foundation -->
  <rect x="124" y="370" width="264" height="20" rx="8" fill="#FFFFFF" stroke="#94A3B8" stroke-width="8" />

  <!-- Left Window -->
  <rect x="156" y="230" width="52" height="64" rx="8" fill="#F0F9FF" stroke="#94A3B8" stroke-width="6" />
  <path d="M156 262 H208 M182 230 V294" stroke="#94A3B8" stroke-width="4" stroke-linecap="round" />
  
  <!-- Right Window -->
  <rect x="304" y="230" width="52" height="64" rx="8" fill="#F0F9FF" stroke="#94A3B8" stroke-width="6" />
  <path d="M304 262 H356 M330 230 V294" stroke="#94A3B8" stroke-width="4" stroke-linecap="round" />

  <!-- Door -->
  <path d="M224 370 V244 A32 32 0 0 1 288 244 V370 Z" fill="url(#soilGradient)" stroke="#78350F" stroke-width="6" />
  <circle cx="272" cy="310" r="5" fill="#FCD34D" />

  <!-- Outer Roof Border -->
  <path d="M420 190 L256 60 L92 190" fill="none" stroke="#BE123C" stroke-width="56" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Inner Roof Gradient -->
  <path d="M420 190 L256 60 L92 190" fill="none" stroke="url(#roofGradient)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
